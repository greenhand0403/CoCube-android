<!doctype html>
<html lang="zh-CN" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <title>更多功能 - CoCube MicroBlocks</title>
  <meta name="viewport"
    content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <script>
    // 语言检测
    const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    const isZh = lang.startsWith('zh');

    // 翻译文本
    const i18n = {
      zh: {
        title: '更多功能',
        soccerTitle: '足球对抗',
        soccerDesc: '控制机器人进行足球比赛',
        cargoTitle: '物品搬运',
        cargoDesc: '控制机器人搬运物品',
        trackTitle: '赛道挑战',
        trackDesc: '完成计时赛道挑战',
        buzzerTitle: '蜂鸣器音乐',
        buzzerDesc: '用卡片演奏音乐',
        midiTitle: 'MIDI 音乐',
        midiDesc: '用卡片演奏 MIDI 乐器',
        mazeTitle: '迷宫路径',
        mazeDesc: '记录坐标自动寻路',
      },
      en: {
        title: 'More Features',
        soccerTitle: 'Soccer Battle',
        soccerDesc: 'Control robot for soccer',
        cargoTitle: 'Cargo Transport',
        cargoDesc: 'Control robot to move cargo',
        trackTitle: 'Race Challenge',
        trackDesc: 'Complete timed race',
        buzzerTitle: 'Buzzer Music',
        buzzerDesc: 'Play music with cards',
        midiTitle: 'MIDI Music',
        midiDesc: 'Play MIDI instruments with cards',
        mazeTitle: 'Maze Path',
        mazeDesc: 'Record waypoints & auto-navigate',
      }
    };

    const t = isZh ? i18n.zh : i18n.en;

    // 页面加载后设置文本
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pageTitle').textContent = t.title;
      document.getElementById('soccerTitle').textContent = t.soccerTitle;
      document.getElementById('soccerDesc').textContent = t.soccerDesc;
      document.getElementById('cargoTitle').textContent = t.cargoTitle;
      document.getElementById('cargoDesc').textContent = t.cargoDesc;
      document.getElementById('trackTitle').textContent = t.trackTitle;
      document.getElementById('trackDesc').textContent = t.trackDesc;
      document.getElementById('buzzerTitle').textContent = t.buzzerTitle;
      document.getElementById('buzzerDesc').textContent = t.buzzerDesc;
      document.getElementById('midiTitle').textContent = t.midiTitle;
      document.getElementById('midiDesc').textContent = t.midiDesc;
      document.getElementById('mazeTitle').textContent = t.mazeTitle;
      document.getElementById('mazeDesc').textContent = t.mazeDesc;
    });
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      padding: 20px 0;
      margin-bottom: 24px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    .back-btn svg {
      fill: white;
    }

    .header h1 {
      color: white;
      font-size: 24px;
      margin-left: 15px;
      font-weight: 600;
    }

    .features-container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* 两列网格 */
    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .feature-card {
      background: white;
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .feature-card:active {
      transform: scale(0.97);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .feature-icon.soccer  { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .feature-icon.cargo   { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .feature-icon.track   { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .feature-icon.buzzer  { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); }
    .feature-icon.midi    { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
    .feature-icon.maze    { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

    .feature-title {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .feature-description {
      font-size: 12px;
      color: #718096;
      line-height: 1.5;
    }

    /* 平板适配：图标和字号放大 */
    @media (min-width: 768px) and (min-height: 768px) {
      .header h1 { font-size: 32px; }

      .features-grid { gap: 20px; }

      .feature-card { padding: 24px 20px; }

      .feature-icon {
        width: 64px;
        height: 64px;
        font-size: 34px;
        margin-bottom: 14px;
      }

      .feature-title { font-size: 20px; }

      .feature-description { font-size: 14px; }
    }

    /* 手机横屏：改为三列以充分利用宽度 */
    @media (max-height: 500px) and (orientation: landscape) {
      body { padding: 10px; }

      .header {
        padding: 8px 0;
        margin-bottom: 12px;
      }

      .header h1 { font-size: 18px; }

      .features-grid {
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .feature-card { padding: 14px 12px; }

      .feature-icon {
        width: 40px;
        height: 40px;
        font-size: 22px;
        margin-bottom: 8px;
        border-radius: 10px;
      }

      .feature-title { font-size: 14px; }

      .feature-description { font-size: 11px; }
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backButton">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
      </svg>
    </button>
    <h1 id="pageTitle"></h1>
  </div>

  <div class="features-container">
    <div class="features-grid">
      <div class="feature-card" id="soccerCard">
        <div class="feature-icon soccer">⚽</div>
        <div class="feature-title" id="soccerTitle"></div>
        <div class="feature-description" id="soccerDesc"></div>
      </div>

      <div class="feature-card" id="cargoCard">
        <div class="feature-icon cargo">📦</div>
        <div class="feature-title" id="cargoTitle"></div>
        <div class="feature-description" id="cargoDesc"></div>
      </div>

      <div class="feature-card" id="trackCard">
        <div class="feature-icon track">🏁</div>
        <div class="feature-title" id="trackTitle"></div>
        <div class="feature-description" id="trackDesc"></div>
      </div>

      <div class="feature-card" id="buzzerCard">
        <div class="feature-icon buzzer">🎸</div>
        <div class="feature-title" id="buzzerTitle"></div>
        <div class="feature-description" id="buzzerDesc"></div>
      </div>

      <div class="feature-card" id="midiCard">
        <div class="feature-icon midi">🎹</div>
        <div class="feature-title" id="midiTitle"></div>
        <div class="feature-description" id="midiDesc"></div>
      </div>

      <div class="feature-card" id="mazeCard">
        <div class="feature-icon maze">🧩</div>
        <div class="feature-title" id="mazeTitle"></div>
        <div class="feature-description" id="mazeDesc"></div>
      </div>
    </div>
  </div>

  <script type="module" src="capacitorBLE.js"></script>
  <script>
    // 处理返回按钮和卡片点击
    document.addEventListener('DOMContentLoaded', () => {
      const backButton = document.getElementById('backButton');
      const soccerCard = document.getElementById('soccerCard');
      const cargoCard = document.getElementById('cargoCard');
      const trackCard = document.getElementById('trackCard');
      const buzzerCard = document.getElementById('buzzerCard');
      const midiCard = document.getElementById('midiCard');
      const mazeCard = document.getElementById('mazeCard');

      function navigate(path) {
        if (window.parent !== window && window.parent.modalNavigator) {
          window.parent.modalNavigator.open(path);
        } else {
          window.location.href = path;
        }
      }

      // 返回按钮处理
      backButton.addEventListener('click', () => {
        if (window.parent !== window && window.parent.modalNavigator) {
          window.parent.modalNavigator.close();
        } else {
          window.location.href = 'index.html';
        }
      });

      soccerCard.addEventListener('click', () => navigate('features/soccer.html'));
      cargoCard.addEventListener('click',  () => navigate('features/cargo.html'));
      trackCard.addEventListener('click',  () => navigate('features/track.html'));
      buzzerCard.addEventListener('click', () => navigate('features/music_buzzer.html'));
      midiCard.addEventListener('click',   () => navigate('features/music_midi.html'));
      mazeCard.addEventListener('click',   () => navigate('features/maze.html'));
    });
  </script>
</body>

</html>
