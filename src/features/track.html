    <script type="module">
        import { sendByteList, listenSerial, bytesToStr, ping } from './serialProtocol.js';
        import { chunks_data } from './chunks/track_chunks.js';

        // 检测环境并使用对应的 BLE 实现
        let bleSerial;
        
        if (window.parent && window.parent.bleSerial) {
            console.log('Using parent bleSerial instance');
            bleSerial = window.parent.bleSerial;
        } else if (typeof window.Capacitor !== 'undefined') {
            console.log('Creating new CapacitorBLESerial instance');
            bleSerial = new window.CapacitorBLESerial();
        }

        // UI 元素
        const backBtn = document.getElementById('backBtn');

        // ==================== 计时器逻辑 ====================
        let timerInterval = null;
        let startTime = 0;

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const decimals = Math.floor((ms % 1000) / 100);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${decimals}`;
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                timerValue.textContent = formatTime(elapsedTime);
            }, 100);
            btnStart.disabled = false;
        }

        function stopTimer() {
            if (!isRunning) return;
            isRunning = false;
            clearInterval(timerInterval);
            btnStart.disabled = false;
        }

        function resetTimer() {
            stopTimer();
            elapsedTime = 0;
            timerValue.textContent = '00:00.0';

        // ==================== 记录管理 ====================
        const RECORDS_KEY = 'cocube_track_records';
        const MAX_RECORDS = 50; // 最多保存50条记录

        function getRecords() {
            try {
                const data = localStorage.getItem(RECORDS_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.error('Error reading records:', e);
                return [];
            }
        }

        function saveRecord(route, timeMs) {
            try {
                const records = getRecords();
                const newRecord = {
                    route: route, // 1 或 2
                    time: timeMs,
                    date: Date.now()
                };
                records.push(newRecord);
                
                // 按路线分组，每组按时间排序
                records.sort((a, b) => {
                    if (a.route !== b.route) return a.route - b.route;
                    return a.time - b.time;
                });
                
                // 保留最近的记录
                if (records.length > MAX_RECORDS) {
                    records.splice(MAX_RECORDS);
                }
                
                localStorage.setItem(RECORDS_KEY, JSON.stringify(records));
                return true;
            } catch (e) {
                console.error('Error saving record:', e);
                return false;
            }
        }

        function clearRecords() {
            try {
                localStorage.removeItem(RECORDS_KEY);
                return true;
            } catch (e) {
                console.error('Error clearing records:', e);
                return false;
            }
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hour = String(date.getHours()).padStart(2, '0');
            const minute = String(date.getMinutes()).padStart(2, '0');
            return `${month}-${day} ${hour}:${minute}`;
        }

        function renderRecords() {
            const records = getRecords();
            
            if (records.length === 0) {
                recordsBody.innerHTML = `<div class="no-records">${t.noRecords}</div>`;
                return;
            }

            // 分别获取路线一和路线二的记录，并添加排名
            const route1Records = records.filter(r => r.route === 1);
            const route2Records = records.filter(r => r.route === 2);
            
            // 按时间排序并添加排名
            route1Records.sort((a, b) => a.time - b.time);
            route2Records.sort((a, b) => a.time - b.time);
            
            route1Records.forEach((r, i) => r.rank = i + 1);
            route2Records.forEach((r, i) => r.rank = i + 1);
            
            // 合并并按日期倒序显示
            const allRecords = [...route1Records, ...route2Records];
            allRecords.sort((a, b) => b.date - a.date);

            let html = `
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>${t.rank}</th>
                            <th>${t.routeHeader}</th>
                            <th>${t.timeHeader}</th>
                            <th>${t.dateHeader}</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            allRecords.forEach(record => {
                const rankClass = record.rank <= 3 ? `rank-${record.rank}` : '';
                const routeClass = record.route === 1 ? 'route-1' : 'route-2';
                const routeName = record.route === 1 ? t.route1 : t.route2;
                
                html += `
                    <tr>
                        <td class="${rankClass}">#${record.rank}</td>
                        <td><span class="route-tag ${routeClass}">${routeName}</span></td>
                        <td>${formatTime(record.time)}</td>
                        <td>${formatDate(record.date)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            recordsBody.innerHTML = html;
        }

        // ==================== 位置和角度检测 ====================
        // 存储 CoCube 的实时位置和角度
        let currentPosition = { x: 0, y: 0 };
        let currentAngle = 0;
        let currentId = 0;
        let lastId = 0;
        let positionUpdateTime = 0;
        
        // 路线检测：x > 250 判定为路线二
        let isRoute2 = false;
        const ROUTE2_X_THRESHOLD = 250;

        function getCoCubePosition() {
            return { ...currentPosition };
        }

        function getCoCubeAngle() {
            return currentAngle;
        }

        function getCoCubeId() {
            return currentId;
        }

        function isOutOfBounds() {
            // 在终点附近忽略越界
            if (GOAL_X_MIN <= currentPosition.x && currentPosition.x <= 50 &&
                GOAL_Y_MIN <= currentPosition.y && currentPosition.y <= GOAL_Y_MAX &&
                isAngleInRange(currentAngle, GOAL_ANGLE_MIN, GOAL_ANGLE_MAX)) {
                return false;
            }
            else if (currentId === 0) {
                lastId = currentId;
                return false;
            }
            else if(lastId ===0 && currentId !==0){
                lastId = currentId;
                return true;
            }
            else{
                return false;
            }
            
        }

        // 处理位置广播消息
        function handlePositionBroadcast(broadcastContent) {
            try {
                // 解析 "x,y,angle,id" 格式的字符串
                const cleanContent = broadcastContent.trim().replace(/^[^\d\-]+/, '');
                const parts = cleanContent.split(',');
                if (parts.length >= 4) {
                    const x = parseFloat(parts[0]);
                    const y = parseFloat(parts[1]);
                    const angle = parseFloat(parts[2]);
                    const id = parseInt(parts[3], 10);

                    if (!isNaN(x) && !isNaN(y) && !isNaN(angle)) {
                        currentPosition.x = x;
                        currentPosition.y = y;
                        currentAngle = angle;
                        currentId = id;
                        positionUpdateTime = Date.now();
                        
                        // 路线检测：x > 250 判定为路线二
                        if (isRunning && x > ROUTE2_X_THRESHOLD) {
                            isRoute2 = true;
                        }
                        
                        // console.log(`📍 Position updated: x=${x}, y=${y}, angle=${angle}°`);
                    }
                }
            } catch (error) {
                console.error('Error parsing position data:', error);
            }
        }

        // ==================== 起点和终点配置 ====================
        // 起点：y在175-200，x在10-30，角度在160-200度
        const START_X_MIN = 10, START_X_MAX = 30;
        const START_Y_MIN = 175, START_Y_MAX = 200;
        const START_ANGLE_MIN = 160, START_ANGLE_MAX = 200;

        // 终点：x在10-22，y在165-200，角度在240-300
        const GOAL_X_MIN = 10, GOAL_X_MAX = 22;
        const GOAL_Y_MIN = 165, GOAL_Y_MAX = 200;
        const GOAL_ANGLE_MIN = 240, GOAL_ANGLE_MAX = 300;

        // 最少用时（秒）
        const MIN_TIME_SECONDS = 10;

        // 检查角度是否在范围内（处理跨越0度的情况）
        function isAngleInRange(angle, minAngle, maxAngle) {
            // 将角度归一化到 0-360
            angle = ((angle % 360) + 360) % 360;
            
            if (minAngle <= maxAngle) {
                // 正常范围，如 240-300
                return angle >= minAngle && angle <= maxAngle;
            } else {
                // 跨越0度的范围，如 345-15
                return angle >= minAngle || angle <= maxAngle;
            }
        }

        function isAtStartPoint() {
            const pos = getCoCubePosition();
            const angle = getCoCubeAngle();
            
            const xInRange = pos.x >= START_X_MIN && pos.x <= START_X_MAX;
            const yInRange = pos.y >= START_Y_MIN && pos.y <= START_Y_MAX;
            const angleInRange = isAngleInRange(angle, START_ANGLE_MIN, START_ANGLE_MAX);
            const idInRange = getCoCubeId() === 0; // 起点要求 ID 为 0

            return xInRange && yInRange && angleInRange && idInRange;
        }

        function isAtGoal() {
            const pos = getCoCubePosition();
            const angle = getCoCubeAngle();
            
            const xInRange = pos.x >= GOAL_X_MIN && pos.x <= GOAL_X_MAX;
            const yInRange = pos.y >= GOAL_Y_MIN && pos.y <= GOAL_Y_MAX;
            const angleInRange = isAngleInRange(angle, GOAL_ANGLE_MIN, GOAL_ANGLE_MAX);
            
            return xInRange && yInRange && angleInRange;
        }

        // ==================== 震动反馈 ====================
        async function vibrate(type = 'warning') {
            try {
                const Haptics = window.parent?.Capacitor?.Plugins?.Haptics 
                             || window.Capacitor?.Plugins?.Haptics;
                
                if (Haptics) {
                    if (Array.isArray(type)) type = 'warning';
                    
                    let duration = 50;
                    if (type === 'success') duration = 100;
                    else if (type === 'warning') duration = 50;
                    else if (type === 'error') duration = 80;
                    
                    Haptics.vibrate({ duration }).catch(() => {
                        Haptics.impact({ style: 'MEDIUM' }).catch(() => {});
                    });
                } else if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            } catch (error) {
                console.warn('Vibration error:', error);
            }
        }

        // ==================== 按钮事件 ====================
        // 更新开始/重置按钮状态
        function updateStartButtonState() {

                btnStart.classList.add('btn-reset');

        btnStart.addEventListener('click', () => {

                updateStartButtonState();

            // 否则尝试开始

            if (!isAtStartPoint()) {
                showAlert(t.positionWarning, t.notAtStartPoint);
                vibrate('warning');
                return;
            }

            // 每次开始都重置计时器，确保从0开始

            isRoute2 = false; // 重置路线状态
            startTimer();
            startBoundaryCheck();
            updateStartButtonState();
        });

        // ==================== 越界检测 ====================
        let boundaryCheckInterval = null;

        function startBoundaryCheck() {
            stopBoundaryCheck();
            boundaryCheckInterval = setInterval(() => {


                if (isAtGoal() && isRunning) {
                    const elapsedSeconds = elapsedTime / 1000;
                    stopTimer();
                    stopBoundaryCheck();
                    updateStartButtonState();
                    
                    if (elapsedSeconds >= MIN_TIME_SECONDS) {
                        // 成功：用时达标，自动保存记录
                        const routeNum = isRoute2 ? 2 : 1;
                        saveRecord(routeNum, elapsedTime);
                        
                        const finalTime = formatTime(elapsedTime);
                        const routeName = isRoute2 ? t.route2 : t.route1;
                        showAlert(t.success, `${t.routeLabel}${routeName}\n${t.timeUsed}${finalTime}`);
                        vibrate('success');
                    } else {
                        // 失败：用时过短
                        resetTimer();
                        showAlert(t.tooFastTitle, t.tooFast);
                        vibrate('error');
                    }
                    return;
                }
                if (isOutOfBounds()) {
                    // 越界：停止计时，重置状态，提示用户
                    stopTimer();
                    stopBoundaryCheck();
                    resetTimer();
                    updateStartButtonState();
                    showAlert(t.outOfBoundsTitle, t.outOfBounds);
                    vibrate('error');
                    return;
                }
            }, 500);
        }

        function stopBoundaryCheck() {
            if (boundaryCheckInterval) {

        // ==================== 通用提示弹窗 ====================

        const progressOverlay = document.getElementById('progressOverlay');

        async function downloadProgram() {

        if (bleSerial.isConnected()) {
            updateConnectStatus();
            if (window.parent && window.parent.modalNavigator) {
                const current = window.parent.modalNavigator.getProgram();
                if (current !== 'track') {

        } else {
            updateConnectStatus();

        setInterval(updateConnectStatus, 200);

        function sendBroadcastMessage(message) {
            if (!bleSerial.isConnected()) return;

            let cmdBytes = new TextEncoder().encode(message);
            let len = cmdBytes.length + 1;
            let broadcastMsg = new Uint8Array(5 + len);
            broadcastMsg.set([0xFB, 0x1B, 0, (len & 255), (len >> 8) & 255]);
            broadcastMsg.set(cmdBytes, 5);
            broadcastMsg.set([0xFE], len + 4);
            bleSerial.write_data(broadcastMsg);
        }

        // ==================== 摇杆控制 ====================
        let joystickActive = false;
        let joystickTouchId = null;
        let lastSendTime = 0;
        const SEND_INTERVAL = 50; // 发送间隔（毫秒）
        let pendingLeftSpeed = -99;
        let pendingRightSpeed = -99;

        function handleJoystickStart(event) {
            event.preventDefault();
            if (joystickActive) return;

            joystickActive = true;
            const touch = event.touches ? event.touches[0] : event;

            if (event.touches) {
                joystickTouchId = touch.identifier;
            }

            handleJoystickMove(touch);

            if (event.touches) {
                document.addEventListener("touchmove", handleTouchMove, { passive: false });
                document.addEventListener("touchend", handleJoystickEnd);
                document.addEventListener("touchcancel", handleJoystickEnd);
            } else {
                document.addEventListener("mousemove", handleMouseMove);
                document.addEventListener("mouseup", handleJoystickEnd);
            }
        }

        joystick.addEventListener("mousedown", handleJoystickStart);
        joystick.addEventListener("touchstart", handleJoystickStart, { passive: false });

        function handleTouchMove(event) {
            event.preventDefault();
            if (!joystickActive) return;

            for (let i = 0; i < event.touches.length; i++) {
                if (event.touches[i].identifier === joystickTouchId) {
                    handleJoystickMove(event.touches[i]);
                    break;
                }
            }
        }

        function handleMouseMove(event) {
            if (joystickActive) {
                handleJoystickMove(event);
            }
        }

        function handleJoystickMove(event) {
            const { angle, distance } = calculateCircleAngleAndDistance(event.clientX, event.clientY);
            const maxDistance = joystick.clientHeight / 2;
            const clampedDistance = Math.min(distance, maxDistance);

            const offsetX = Math.sin(angle * Math.PI / 180) * clampedDistance;
            const offsetY = -Math.cos(angle * Math.PI / 180) * clampedDistance;
            joystickHandle.style.transform = `translate(calc(-50% + ${offsetX}px), calc(-50% + ${offsetY}px))`;

            const speeds = calculateWheelSpeeds(angle, clampedDistance, maxDistance);
            
            // 更新待发送的速度值
            pendingLeftSpeed = speeds.leftSpeed * -1;
            pendingRightSpeed = speeds.rightSpeed * -1;
            
            // 节流：仅在间隔时间后才发送
            const now = Date.now();
            if (now - lastSendTime >= SEND_INTERVAL) {
                sendWheelSpeeds(pendingLeftSpeed, pendingRightSpeed);
                lastSendTime = now;
            }
        }

        function handleJoystickEnd(event) {
            if (event.touches) {
                let joystickTouchStillActive = false;
                for (let i = 0; i < event.touches.length; i++) {
                    if (event.touches[i].identifier === joystickTouchId) {
                        joystickTouchStillActive = true;
                        break;
                    }
                }
                if (joystickTouchStillActive) return;
            }

            joystickActive = false;
            joystickTouchId = null;
            joystickHandle.style.transform = 'translate(-50%, -50%)';
            
            // 立即发送停止指令，重置节流计时器
            sendWheelSpeeds(-99, -99);
            lastSendTime = 0;
            pendingLeftSpeed = -99;
            pendingRightSpeed = -99;

            document.removeEventListener("touchmove", handleTouchMove);
            document.removeEventListener("touchend", handleJoystickEnd);
            document.removeEventListener("touchcancel", handleJoystickEnd);
            document.removeEventListener("mousemove", handleMouseMove);
            document.removeEventListener("mouseup", handleJoystickEnd);
        }

        function calculateCircleAngleAndDistance(clientX, clientY) {
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.x + rect.width / 2;
            const centerY = rect.y + rect.height / 2;

            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const angleInRadians = Math.atan2(deltaY, deltaX);
            let angleInDegrees = (angleInRadians * 180) / Math.PI + 90;

            return { angle: angleInDegrees, distance };
        }

        function calculateWheelSpeeds(angle, distance, maxDistance) {
            const maxLinearSpeed = 50;
            const maxAngularSpeed = 50;

            const projectionX = Math.sin(angle * Math.PI / 180) * distance;
            const projectionY = -Math.cos(angle * Math.PI / 180) * distance;

            const linearSpeed = (projectionY / 70) * maxLinearSpeed;
            const angularSpeed = (projectionX / 70) * maxAngularSpeed;

            let leftSpeed = linearSpeed - angularSpeed;
            let rightSpeed = linearSpeed + angularSpeed;

            const maxSpeed = 50;
            const maxWheelSpeed = Math.max(Math.abs(leftSpeed), Math.abs(rightSpeed));

            if (Math.abs(leftSpeed) > maxSpeed) {
                const scale = maxSpeed / maxWheelSpeed;
                leftSpeed *= scale;
            } else if (Math.abs(rightSpeed) > maxSpeed) {
                const scale = maxSpeed / maxWheelSpeed;
                rightSpeed *= scale;
            }

            return {
                leftSpeed: Math.round(leftSpeed),
                rightSpeed: Math.round(rightSpeed)
            };
        }

        function sendWheelSpeeds(leftSpeed, rightSpeed) {
            const message = `call,uuidid,CoCube set wheel,${leftSpeed},${rightSpeed}`;
            sendBroadcastMessage(message);
        }

        joystick.addEventListener("touchstart", handleJoystickStart, { passive: false });
        joystick.addEventListener("mousedown", handleJoystickStart);

        setInterval(updateConnectStatus, 500);

        // ==================== 消息监听循环 ====================
        // 持续检查来自设备的消息，获取位置和角度信息
        setInterval(() => {
            if (bleSerial && bleSerial.isConnected()) {
                listenSerial(bleSerial, (data) => {
                    // 处理广播消息 (Opcode 0x1b)
                    if (data.opcode === 0x1b) {
                        const broadcastContent = bytesToStr(data.data);
                        // console.log('📢 Broadcast received:', broadcastContent);
                        
                        // 尝试解析位置数据 (格式: "x,y,angle")
                        handlePositionBroadcast(broadcastContent);
                    }
                    // 处理“说”消息
                    else if (data.opcode === 0x14) {
                        const sayContent = bytesToStr(data.data);
                        // console.log('Say received:', sayContent);

                        // 尝试解析位置数据 (格式: "x,y,angle")
                        handlePositionBroadcast(sayContent);
                    }
                    // 调试：显示其他消息类型
                    else {
                        console.log('Other message - Opcode:', '0x' + data.opcode.toString(16), 'Data:', data.data);
                    }
                });
            }
        }, 10); // 每10毫秒检查一次

        setInterval(() => {
            if (bleSerial && bleSerial.isConnected()) {
                ping(bleSerial);
            }
        }, 2000); // 每2000毫秒ping一次

    </script>
