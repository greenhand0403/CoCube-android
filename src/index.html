		/* the canvas *must not* have any border or padding, or mouse coords will be wrong */
		canvas.emscripten {
			border: 0px none;
			margin-left: 0px;
			margin-top: -18px
		}

		.spinner {
			height: 30px;
			width: 30px;
			margin: 0;
			margin-top: 5px;
			margin-left: 20px;
			display: inline-block;
			vertical-align: top;

			-webkit-animation: rotation .8s linear infinite;
			-moz-animation: rotation .8s linear infinite;
			-o-animation: rotation .8s linear infinite;
			animation: rotation 0.8s linear infinite;

			border-left: 5px solid rgb(235, 235, 235);
			border-right: 5px solid rgb(235, 235, 235);
			border-bottom: 5px solid rgb(235, 235, 235);
			border-top: 5px solid rgb(120, 120, 120);

			border-radius: 100%;
			background-color: rgb(189, 215, 46);
		}

		@-webkit-keyframes rotation {
			from {
				-webkit-transform: rotate(0deg);
			}

			to {
				-webkit-transform: rotate(360deg);
			}
		}

		@-moz-keyframes rotation {
			from {
				-moz-transform: rotate(0deg);
			}

			to {
				-moz-transform: rotate(360deg);
			}
		}

		@-o-keyframes rotation {
			from {
				-o-transform: rotate(0deg);
			}

			to {
				-o-transform: rotate(360deg);
			}
		}

		@keyframes rotation {
			from {
				transform: rotate(0deg);
			}

			to {
				transform: rotate(360deg);
			}
		}

		#status {

		// Auto-detect language from browser and set preferences
		(function () {
			// Check if language preference already exists
			var prefs = {};
			try {
				var existingPrefs = localStorage.getItem('user-prefs');
				if (existingPrefs) {
					prefs = JSON.parse(existingPrefs);
					if (prefs.locale) return; // Already set
				}
			} catch (e) { }

			// Language mapping based on AuthoringSpecs.gp
			var langMap = {
				'es': 'es', 'ca': 'ca', 'de': 'de', 'en': 'en',
				'eu': 'eu', 'fr': 'fr', 'gl': 'gl', 'it': 'it',
				'nl': 'nl', 'pl': 'pl', 'pt': 'pt', 'ro': 'ro',
				'tr': 'tr', 'uz': 'uz', 'cs': 'cs', 'el': 'el',
				'ru': 'ru', 'sr': 'sr', 'uk': 'uk', 'ar': 'ar',
				'fa': 'fa', 'ta': 'ta', 'ja': 'ja', 'ko': 'ko'
			};

			// Get browser language base code
			var browserLang = (navigator.language || 'en').split('-')[0];
			var detectedLang = langMap[browserLang] || 'en';

			// Handle Chinese and Portuguese variants
			if (browserLang === 'zh') {
				var fullLang = navigator.language.toLowerCase();
				detectedLang = (fullLang.includes('tw') || fullLang.includes('hk') || fullLang.includes('hant'))
					? 'zh-cht' : 'zh-chs';
			} else if (browserLang === 'pt') {
				detectedLang = navigator.language.toLowerCase().includes('br') ? 'pt-br' : 'pt';
			}

			// Save preference
			prefs.locale = detectedLang;
			localStorage.setItem('user-prefs', JSON.stringify(prefs));
			console.log('MicroBlocks: Language set to:', detectedLang);
		})();

	<!-- Android 返回按钮处理 -->
	<script type="module">
		import { App } from '@capacitor/app';
		import { Haptics, ImpactStyle } from '@capacitor/haptics';

		let lastBackPress = 0;
		const DOUBLE_PRESS_INTERVAL = 2000; // 2秒内双击退出

		// 语言检测
		const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
		const isZh = lang.startsWith('zh');
		const exitHintText = isZh ? '再按一次退出应用' : 'Press back again to exit';

		// 显示简单的退出提示
		function showExitHint() {
			// 创建一个简单的提示元素
			let hint = document.getElementById('exitHint');
			if (!hint) {
				hint = document.createElement('div');
				hint.id = 'exitHint';
				hint.style.cssText = `
					position: fixed;
					bottom: 50px;
					left: 50%;
					transform: translateX(-50%);
					background: rgba(0, 0, 0, 0.7);
					color: white;
					padding: 12px 24px;
					border-radius: 8px;
					font-size: 14px;
					z-index: 99999;
					pointer-events: none;
					opacity: 0;
					transition: opacity 0.3s;
				`;
				document.body.appendChild(hint);
			}
			hint.textContent = exitHintText;
			hint.style.opacity = '1';
			setTimeout(() => {
				hint.style.opacity = '0';
			}, 1500);
		}

		// 监听 Android 返回按钮事件
		App.addListener('backButton', async ({ canGoBack }) => {
			// 检查是否有模态窗口打开
			if (window.modalNavigator && window.modalNavigator.isModalOpen()) {
				// 使用分级返回（先返回上一页，没有历史时关闭模态窗口）
				window.modalNavigator.goBack();
			} else {
				// 在主页面，双击退出
				const now = Date.now();
				if (now - lastBackPress < DOUBLE_PRESS_INTERVAL) {
					// 第二次按返回，退出应用
					App.exitApp();
				} else {
					// 第一次按返回，显示提示并触发触觉反馈
					lastBackPress = now;
					showExitHint();
					try {
						await Haptics.impact({ style: ImpactStyle.Light });
					} catch (e) {
						// 忽略错误
					}
				}
			}
		});
	</script>
